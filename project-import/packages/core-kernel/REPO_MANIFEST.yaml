apiVersion: codexvanta.os/v1
kind: RepoManifest
metadata:
  name: codexvanta-os-core-kernel
  description: 核心抽象介面、Provider Registry、Native/External Provider 實作
  layer: B-Runtime
  layerDescription: 運行層 — 核心運行時、事件處理、任務執行
  plane: Control
  planeDescription: 控制面 — 平台核心控制與配置
  tier: 0
  tags:
  - core
  - interfaces
  - providers
  - registry
spec:
  architecture:
    philosophy: native-first / provider-agnostic
    principle: 第三方服務是擴充出口，不是平台地基
    mode: native | connected | hybrid
  capabilities:
  - database
  - storage
  - auth
  - queue
  - stateStore
  - secrets
  - repo
  - deploy
  - validation
  - security
  - observability
  - notification
  providerDependencies: []
  repoDependencies: []
  providesInterfaces: true
  providesNativeProviders: true
  providesExternalProviders: true
