  description: 平台主入口、啟動引導、Provider 自動偵測與組裝
  layer: B-Runtime
  layerDescription: 運行層 — 核心運行時、事件處理、任務執行
  plane: Control
  planeDescription: 控制面 — 平台核心控制與配置
