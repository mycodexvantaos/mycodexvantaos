apiVersion: codexvanta.os/v1
kind: RepoManifest
metadata:
  name: codexvanta-os-config-manager
  description: 配置管理 — 分層配置、環境變數、功能開關
  layer: C-NativeServices
  layerDescription: 原生服務層 — 平台內建服務（零第三方依賴可運行）
  plane: Control
  planeDescription: 控制面 — 平台核心控制與配置
  tier: 1
  tags:
  - config
  - feature-flags
spec:
  architecture:
    philosophy: native-first / provider-agnostic
    principle: 第三方服務是擴充出口，不是平台地基
    mode: native | connected | hybrid
  capabilities:
  - config-read
  - config-write
  - feature-flags
  providerDependencies:
  - database
  - stateStore
  repoDependencies:
  - codexvanta-os-core-kernel
