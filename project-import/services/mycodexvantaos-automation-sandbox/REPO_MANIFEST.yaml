apiVersion: codexvanta.os/v1
kind: RepoManifest
metadata:
  name: codexvanta-os-fleet-sandbox
  description: 沙箱艦隊 — 隔離執行環境、容器管理
  layer: B-Runtime
  layerDescription: 運行層 — 核心運行時、事件處理、任務執行
  plane: Sandbox
  planeDescription: 沙箱面 — 隔離執行環境
  tier: 3
  tags:
  - sandbox
  - isolation
  - containers
spec:
  architecture:
    philosophy: native-first / provider-agnostic
    principle: 第三方服務是擴充出口，不是平台地基
    mode: native | connected | hybrid
  capabilities:
  - sandbox-creation
  - isolation
  - container-management
  providerDependencies:
  - deploy
  - stateStore
  repoDependencies:
  - codexvanta-os-core-kernel
  - codexvanta-os-scheduler
