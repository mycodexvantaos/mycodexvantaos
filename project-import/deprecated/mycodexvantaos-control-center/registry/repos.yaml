apiVersion: codexvanta.os/v1
kind: RepositoryRegistry
metadata:
  description: CodexvantaOS 25-Repository Registry — Native-first Architecture
  philosophy: native-first / provider-agnostic
  generatedAt: auto-generated by restructure script
layers:
  A-Builder: 建構層 — 代碼生成、AST分析、模組擴展
  B-Runtime: 運行層 — 核心運行時、事件處理、任務執行
  C-NativeServices: 原生服務層 — 平台內建服務（零第三方依賴可運行）
  D-Connector: 連接器層 — 第三方服務整合（可選，非必要）
  E-DeploymentTarget: 部署目標層 — 多目標部署支援
planes:
  Control: 控制面 — 平台核心控制與配置
  Governance: 治理面 — 策略、合規、自治
  Execution: 執行面 — 任務、工作流、自動化
  Integration: 整合面 — 事件、網路、外部系統
  Data: 資料面 — 資料管線、ETL、儲存
  Decision: 決策面 — AI、規則、條件路由
  Experience: 體驗面 — UI、CLI、使用者介面
  Observability: 可觀測面 — 日誌、指標、追蹤
  Sandbox: 沙箱面 — 隔離執行環境
repositories:
  codexvanta-os-ai-engine:
    layer: B-Runtime
    plane: Decision
    tier: 3
    description: AI 引擎 — LLM 整合、推理、Agent 執行
    capabilities:
    - llm-inference
    - agent-execution
    - embedding
    - rag
    dependencies:
    - codexvanta-os-core-kernel
    - codexvanta-os-data-pipeline
    tags:
    - ai
    - llm
    - agent
    - inference
  codexvanta-os-app-portal:
    layer: C-NativeServices
    plane: Experience
    tier: 4
    description: 應用入口 — 使用者入口、多租戶管理
    capabilities:
    - user-portal
    - multi-tenancy
    - marketplace
    dependencies:
    - codexvanta-os-core-kernel
    - codexvanta-os-auth-service
    - codexvanta-os-app-ui
    tags:
    - portal
    - multi-tenant
    - marketplace
  codexvanta-os-app-ui:
    layer: C-NativeServices
    plane: Experience
    tier: 3
    description: 應用 UI — Web 管理控制台前端
    capabilities:
