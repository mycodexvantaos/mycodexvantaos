apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycodexvantaos-infra-gitops
  namespace: mycodexvantaos
  labels:
    app: mycodexvantaos-infra-gitops
    part-of: mycodexvantaos
    component: infra-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycodexvantaos-infra-gitops
  template:
    metadata:
      labels:
        app: mycodexvantaos-infra-gitops
        part-of: mycodexvantaos
    spec:
      serviceAccountName: mycodexvantaos-gitops-controller
      containers:
        - name: mycodexvantaos-infra-gitops
          image: registry.local/mycodexvantaos/mycodexvantaos-infra-gitops:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: RECONCILE_INTERVAL_MS
              value: "60000"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: mycodexvantaos-infra-gitops-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
