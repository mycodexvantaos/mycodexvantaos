apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycodexvantaos-observability-stack
  namespace: mycodexvantaos
  labels:
    app: mycodexvantaos-observability-stack
    part-of: mycodexvantaos
    component: observability-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycodexvantaos-observability-stack
  template:
    metadata:
      labels:
        app: mycodexvantaos-observability-stack
        part-of: mycodexvantaos
        component: observability-stack
    spec:
      containers:
        - name: mycodexvantaos-observability-stack
          image: registry.local/mycodexvantaos/mycodexvantaos-observability-stack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mycodexvantaos-observability-stack-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"