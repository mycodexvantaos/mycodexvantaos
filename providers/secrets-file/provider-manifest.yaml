apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: secrets-file
  capability: secrets
  labels:
    source: native
    tier: "0"
spec:
  providerName: file
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_SECRETS_FILE
  description: |
    Native file-based secrets provider for MyCodexVantaOS.
    Provides zero-dependency secrets management capability in native mode.
    Supports encryption at rest with configurable cipher.