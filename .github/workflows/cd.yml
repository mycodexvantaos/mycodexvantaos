name: Continuous Deployment (Docker & GitOps)
on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: registry.internal/mycodexvantaos

jobs:
  build-and-push:
    name: 🐳 Build and Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: 
          - core-auth
          - data-vector-store
          - ai-ensemble
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build image
        run: |
          docker build \\
            --build-arg SERVICE_NAME=mycodexvantaos-\${{ matrix.service }} \\
            -t \${{ env.REGISTRY }}/mycodexvantaos-\${{ matrix.service }}:\${{ github.sha }} \\
            -f build/Dockerfile.app .
            
      - name: Push image (Simulated)
        run: |
          echo "docker push \${{ env.REGISTRY }}/mycodexvantaos-\${{ matrix.service }}:\${{ github.sha }}"
          echo "✅ Successfully pushed to internal registry"

  gitops-update:
    name: 🦑 Update ArgoCD Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        
      - name: Update Production Overlay Image Tags
        run: |
          cd infra/kubernetes/overlays/production
          kustomize edit set image registry.internal/mycodexvantaos/mycodexvantaos-core-auth=\${{ env.REGISTRY }}/mycodexvantaos-core-auth:\${{ github.sha }}
          kustomize edit set image registry.internal/mycodexvantaos/mycodexvantaos-data-vector-store=\${{ env.REGISTRY }}/mycodexvantaos-data-vector-store:\${{ github.sha }}
          kustomize edit set image registry.internal/mycodexvantaos/mycodexvantaos-ai-ensemble=\${{ env.REGISTRY }}/mycodexvantaos-ai-ensemble:\${{ github.sha }}
          
      - name: Commit and Push via GitOps Bot
        run: |
          git config user.name "CodexVantaOS GitOps Bot"
          git config user.email "gitops@codexvantaos.org"
          git commit -am "chore(cd): update production image tags to commit \${{ github.sha }}" || echo "No changes to commit"
          # git push origin main 
          echo "✅ Git repo updated, ArgoCD will auto-sync changes!"
